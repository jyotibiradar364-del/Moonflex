services:
  - type: web
    name: moonflex-backend
    env: python
    rootDir: server
    buildCommand: "./build.sh"
    startCommand: "gunicorn moonflex_server.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://moonflex.vercel.app,https://moonflex-jyotibiradar364-dels-projects.vercel.app,http://localhost:5173,http://localhost:5174"
